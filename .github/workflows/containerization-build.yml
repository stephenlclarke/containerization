name: Build containerization

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - release/*

concurrency:
  group: containerization-build-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - name: Checkout for push diff
        if: github.event_name == 'push'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]]; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              printf 'heavy=true\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          heavy=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*)
                ;;
              *)
                heavy=true
                break
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"

  verify-signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check all commits are signed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          commits=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate)
          unsigned_commits=""

          while IFS='|' read -r sha author verified; do
            if [ "$verified" != "true" ]; then
              unsigned_commits="$unsigned_commits  - $sha by $author\n"
            fi
          done < <(echo "$commits" | jq -r '.[] | "\(.sha)|\(.commit.author.name)|\(.commit.verification.verified)"')

          if [ -n "$unsigned_commits" ]; then
            echo "::error::The following commits are not signed:"
            echo -e "$unsigned_commits"
            echo ""
            echo "Please sign your commits. See:"
            echo  "  - https://github.com/apple/containerization/blob/main/CONTRIBUTING.md#pull-requests"
            echo  "  - https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits"
            exit 1
          fi

          echo "All commits are signed!"

  containerization:
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    permissions:
      contents: read
      packages: write
      pages: write
    uses: ./.github/workflows/containerization-build-template.yml
    secrets: inherit
