name: Linux build

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - release/*

concurrency:
  group: linux-build-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - name: Checkout for push diff
        if: github.event_name == 'push'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]]; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              printf 'heavy=true\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          heavy=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*)
                ;;
              *)
                heavy=true
                break
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"

  swift-version:
    name: Determine Swift version
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.version.outputs.image }}
    steps:
      - name: Checkout .swift-version
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          sparse-checkout: .swift-version
          sparse-checkout-cone-mode: false

      - name: Read Swift version
        id: version
        run: echo "image=swift:$(cat .swift-version)-noble" >> "$GITHUB_OUTPUT"

  build:
    name: Linux compile check
    needs:
      - changes
      - swift-version
    if: needs.changes.outputs.heavy == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    container: ${{ needs.swift-version.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: apt-get update && apt-get install -y curl make libarchive-dev libbz2-dev liblzma-dev libssl-dev

      - name: Build containerization
        run: make containerization

      - name: Build vminitd (glibc)
        run: make -C vminitd SWIFT_CONFIGURATION="--disable-automatic-resolution -Xswiftc -warnings-as-errors"

      - name: Install Static Linux SDK
        run: make -C vminitd linux-sdk

      - name: Build vminitd (musl)
        run: make -C vminitd

      - name: Run unit tests
        run: swift test --disable-automatic-resolution -Xswiftc -warnings-as-errors
